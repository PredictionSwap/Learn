site_name: "PredictionSwap Foundational Docs"
site_description: Protocol infrastructure for prediction markets.
site_url: https://your-site.netlify.app

theme:
  name: material
  custom_dir: docs/overrides
  language: en

  logo: assets/logo.png
  favicon: assets/favicon.png

  font:
    text: Montserrat
    code: JetBrains Mono

  features:
    - navigation.sections
    - navigation.expand
    - search.highlight
    - search.share

  palette:
    scheme: default
    primary: indigo
    accent: indigo

markdown_extensions:
  - toc:
      permalink: true
  - tables
  - admonition
  - codehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed
  - pymdownx.arithmatex:
      generic: true

plugins:
  - search

extra_css:
  - brand.css

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  homepage: https://predictionswap.org
  social:
    - icon: fontawesome/solid/arrow-left
      link: https://predictionswap.org
      name: Main Site

nav:

  - Main Site: https://predictionswap.org
  - Overview: index.md

  - The Problem:
      - "Why Is Polymarket Centralised?": Centralisation.md
      - "Additional Structural Inefficiencies in Polymarket": Inefficiencies.md

  - The Shift:
      - "Better Execution": ExposureExecution.md
      - "Simplified Intents": SimplifiedIntents.md

  - The Unlock:
      - "Open Prediction Markets: A New Landscape": NewLandscape.md
      - "ZAMMs: Automated Market Makers Without Pools": ZAMMs.md

  - The Litepaper:
      - Litepaper (PDF): assets/litepaper.pdf